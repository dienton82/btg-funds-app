<div class="app-shell">
  <header class="app-shell__header">
    <div>
      <p class="app-shell__eyebrow">Prueba tecnica BTG Pactual</p>
      <h1 class="app-shell__title">Plataforma de manejo de fondos</h1>
      <p class="app-shell__subtitle">
        Demo funcional en Angular para suscripcion, cancelacion y consulta de historial.
      </p>
    </div>

    <nav class="app-shell__nav" aria-label="Navegacion principal">
      <a
        routerLink="/funds"
        routerLinkActive="app-shell__link--active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="app-shell__link"
      >
        Fondos
      </a>
      <a
        routerLink="/transactions"
        routerLinkActive="app-shell__link--active"
        class="app-shell__link"
      >
        Historial
      </a>
    </nav>
  </header>

  <main class="app-shell__content">
    <router-outlet />
  </main>
</div>
